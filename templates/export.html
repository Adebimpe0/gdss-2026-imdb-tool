{% extends "base.html" %}
{% block title %}Export Successful - IMDB Tool{% endblock %}
{% block content %}
    <style>
        @keyframes pulseSuccess {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 25px rgba(25, 135, 84, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(25, 135, 84, 0); }
        }
    </style>
    <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
        <div class="col-md-6">
            <div class="glass-container text-center p-5">
                <div class="mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-success text-white rounded-circle" style="width: 90px; height: 90px; font-size: 45px; animation: pulseSuccess 2s infinite;">
                        <i class="bi bi-check-lg"></i>
                    </div>
                </div>
                <h2 class="text-success fw-bold mb-3">Export Successful!</h2>
                <p class="text-muted fs-5 mb-2">Your product data has been exported successfully.</p>
                <p class="text-muted mb-5">The file is ready to be uploaded into your product master database.</p>
                <a href="/" class="btn btn-primary btn-lg px-5 shadow-sm"><i class="bi bi-arrow-repeat"></i> Upload Another Image</a>
            </div>
        </div>
    </div>
{% endblock %}
