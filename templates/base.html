<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IMDB Tool{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #f8f9fc;
        min-height: 100vh;
        color: #333;
        position: relative;
        overflow-x: hidden;
      }
      /* Mesmerizing Animated Background Orbs */
      .bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        z-index: -1;
        animation: floatOrb 12s infinite alternate ease-in-out;
      }
      .orb-1 { width: 450px; height: 450px; background: rgba(52, 152, 219, 0.4); top: -100px; left: -100px; }
      .orb-2 { width: 550px; height: 550px; background: rgba(155, 89, 182, 0.3); bottom: -150px; right: -100px; animation-delay: -5s; }
      .orb-3 { width: 350px; height: 350px; background: rgba(46, 204, 113, 0.2); top: 30%; left: 40%; animation-duration: 18s; }
      @keyframes floatOrb {
        0% { transform: translateY(0) scale(1); }
        100% { transform: translateY(50px) scale(1.1); }
      }
      .navbar {
        background: rgba(255, 255, 255, 0.8) !important;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      }
      .navbar-brand {
        font-weight: 700;
        letter-spacing: 0.5px;
        background: linear-gradient(45deg, #2c3e50, #3498db);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .nav-link {
        font-weight: 500;
        color: #555 !important;
        transition: color 0.3s ease;
      }
      .nav-link:hover {
        color: #3498db !important;
      }
      .card {
        border: none;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }
      .btn {
        border-radius: 50rem;
        font-weight: 500;
        padding: 10px 24px;
        transition: all 0.3s ease;
      }
      .btn-primary {
        background: linear-gradient(45deg, #3498db, #2980b9);
        border: none;
        box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
      }
      .btn-primary:hover {
        background: linear-gradient(45deg, #2980b9, #1f618d);
        box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        transform: translateY(-2px);
      }
      .btn-success {
        background: linear-gradient(45deg, #2ecc71, #27ae60);
        border: none;
        box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
      }
      .btn-success:hover {
        background: linear-gradient(45deg, #27ae60, #1e8449);
        box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
        transform: translateY(-2px);
      }
      .btn-outline-secondary {
        border: 2px solid #95a5a6;
        color: #7f8c8d;
        background: transparent;
      }
      .btn-outline-secondary:hover {
        background-color: #95a5a6;
        color: white;
        transform: translateY(-2px);
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: 600;
        color: #2c3e50;
      }
      .text-gradient {
        background: linear-gradient(45deg, #2c3e50, #3498db);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .form-control {
        border-radius: 12px;
        border: 1px solid #dce1e6;
        padding: 12px 16px;
        background-color: rgba(255, 255, 255, 0.9);
        transition: all 0.3s ease;
      }
      .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        background-color: #ffffff;
      }
      .glass-container {
        background: rgba(255, 255, 255, 0.5);
        border-radius: 24px;
        padding: 50px;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
      <div class="container">
        <a class="navbar-brand" href="/">IMDB Tool</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/extract">Extract</a></li>
            <!-- <li class="nav-item"><a class="nav-link" href="/extracted">Results</a></li> -->
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
