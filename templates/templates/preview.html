<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDB Tool - Preview & Edit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Preview & Edit Extracted Data</h2>
        <div class="card p-4 shadow">
            <form action="/export" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Barcode</label>
                    <input type="text" class="form-control" name="barcode" value="{{ data.barcode }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Category Type</label>
                    <input type="text" class="form-control" name="category_type" value="{{ data.category_type }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Segment Type</label>
                    <input type="text" class="form-control" name="segment_type" value="{{ data.segment_type }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Manufacturer</label>
                    <input type="text" class="form-control" name="manufacturer" value="{{ data.manufacturer }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Brand</label>
                    <input type="text" class="form-control" name="brand" value="{{ data.brand }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Product Name</label>
                    <input type="text" class="form-control" name="product_name" value="{{ data.product_name }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Weight & Unit</label>
                    <input type="text" class="form-control" name="weight_unit" value="{{ data.weight_unit }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Packaging Type</label>
                    <input type="text" class="form-control" name="packaging_type" value="{{ data.packaging_type }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Country of Origin</label>
                    <input type="text" class="form-control" name="country_of_origin" value="{{ data.country_of_origin }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Promotional Message</label>
                    <input type="text" class="form-control" name="promo_message" value="{{ data.promo_message }}">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" name="format" value="csv" class="btn btn-success w-50">Export as CSV</button>
                    <button type="submit" name="format" value="excel" class="btn btn-primary w-50">Export as Excel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
