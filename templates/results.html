{% extends "base.html" %}
{% block title %}Extraction Results - IMDB Tool{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Extraction Results</h2>
        <div>
            <a href="/export" class="btn btn-outline-primary me-2">Export CSV</a>
            <a href="/export" class="btn btn-outline-secondary">Export Excel</a>
        </div>
    </div>

    <form id="edit-form" method="post" action="/extracted" class="needs-validation">
        <div class="row g-3">
            {% for key in data %}
            <div class="col-md-6">
                <label class="form-label">{{ key }}</label>
                <input type="text" name="{{ key }}" class="form-control" value="{{ data[key] }}">
            </div>
            {% endfor %}
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-success">Save Edits</button>
        </div>
    </form>
{% endblock %}
