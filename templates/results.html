{% extends "base.html" %}
{% block title %}Extraction Results - IMDB Tool{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="text-gradient fw-bold">Extraction Results</h2>
        <div>
            <a href="/export" class="btn btn-primary me-2 shadow-sm">Export CSV</a>
            <a href="/export" class="btn btn-success shadow-sm">Export Excel</a>
        </div>
    </div>

    <form id="edit-form" method="post" action="/extracted" class="needs-validation card p-4 mb-5 border-0">
        <div class="row g-4">
            {% for key in data %}
            <div class="col-md-6">
                <label class="form-label fw-semibold text-muted">{{ key }}</label>
                <input type="text" name="{{ key }}" class="form-control form-control-lg" value="{{ data[key] }}">
            </div>
            {% endfor %}
        </div>
        <div class="mt-5 text-end">
            <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">Save Edits</button>
        </div>
    </form>
{% endblock %}
