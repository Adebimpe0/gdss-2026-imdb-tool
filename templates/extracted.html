{% extends "base.html" %}
{% block title %}Saved Extraction - IMDB Tool{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Saved Extraction</h2>
        <div>
            <a href="/export" class="btn btn-outline-primary me-2">Export CSV</a>
            <a href="/export" class="btn btn-outline-secondary">Export Excel</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <ul class="list-group">
                {% for item in data %}
                <li class="list-group-item d-flex justify-content-between">
                    <strong>{{ item }}</strong>
                    <span>{{ data[item] }}</span>
                </li>
                {% endfor %}
            </ul>
            <div class="mt-3">
                <a href="/extract" class="btn btn-secondary">Edit</a>
            </div>
        </div>
    </div>
{% endblock %}
