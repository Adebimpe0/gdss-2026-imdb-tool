<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDB Tool - Preview & Edit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Preview & Edit Extracted Data</h2>
        <div class="card p-4 shadow">
            <form action="/export" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Item Name</label>
                    <input type="text" class="form-control" name="item_name" value="{{ data.item_name }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Barcode</label>
                    <input type="text" class="form-control" name="barcode" value="{{ data.barcode }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Manufacturer</label>
                    <input type="text" class="form-control" name="manufacturer" value="{{ data.manufacturer }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Brand</label>
                    <input type="text" class="form-control" name="brand" value="{{ data.brand }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Weight</label>
                    <input type="text" class="form-control" name="weight" value="{{ data.weight }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Packaging Type</label>
                    <input type="text" class="form-control" name="packaging_type" value="{{ data.packaging_type }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Country</label>
                    <input type="text" class="form-control" name="country" value="{{ data.country }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Variant</label>
                    <input type="text" class="form-control" name="variant" value="{{ data.variant }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Type</label>
                    <input type="text" class="form-control" name="type" value="{{ data.type }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Fragrance/Flavor</label>
                    <input type="text" class="form-control" name="fragrance_flavor" value="{{ data.fragrance_flavor }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Promotion</label>
                    <input type="text" class="form-control" name="promotion" value="{{ data.promotion }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Addons</label>
                    <input type="text" class="form-control" name="addons" value="{{ data.addons }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Tagline</label>
                    <input type="text" class="form-control" name="tagline" value="{{ data.tagline }}">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" name="format" value="csv" class="btn btn-success w-50">Export as CSV</button>
                    <button type="submit" name="format" value="excel" class="btn btn-primary w-50">Export as
                        Excel</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
