{% extends "base.html" %}
{% block title %}Upload - IMDB Tool{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title text-center mb-3">AI Product Image Analyzer</h4>
                    <form action="/extract" method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <input type="file" class="form-control" name="image" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Extract Product Data</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
