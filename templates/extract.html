{% extends "base.html" %}
{% block title %}Upload Image - IMDB Tool{% endblock %}
{% block content %}
    <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
        <div class="col-md-7">
            <div class="card overflow-hidden">
                <div class="card-header bg-transparent border-0 pt-5 pb-2 text-center">
                    <h3 class="card-title fw-bold mb-0 text-gradient">Upload Product Image</h3>
                </div>
                <div class="card-body p-5 text-center">
                    <form method="POST" action="/extract" enctype="multipart/form-data" onsubmit="document.getElementById('loadingOverlay').style.display='flex';">
                        <div class="mb-4">
                            <label for="imageUpload" class="form-label text-muted mb-3 d-block fs-5">Select an image to extract product master data</label>
                            <input type="file" class="form-control form-control-lg" id="imageUpload" name="image" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm mt-2"><i class="bi bi-magic"></i> Extract Data</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Beautiful Loading Overlay for AI Extraction -->
    <div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 9999; backdrop-filter: blur(15px); flex-direction: column; justify-content: center; align-items: center;">
        <div class="spinner-grow text-primary" style="width: 4rem; height: 4rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h3 class="mt-4 text-gradient fw-bold">Extracting Data...</h3>
        <p class="text-muted fs-5">Gemini 2.5 AI is analyzing your image</p>
    </div>
{% endblock %}
